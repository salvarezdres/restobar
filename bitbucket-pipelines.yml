image: node:20

pipelines:
  branches:
    master:
      - step:
          name: Build and deploy to Firebase Hosting
          caches:
            - node
          script:
            - npm ci
            - npm run build
            - npm install -g firebase-tools
            - firebase deploy --non-interactive --only hosting --project "scrum-poket-453df" --token "$FIREBASE_TOKEN"
